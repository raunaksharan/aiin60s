<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Your Plan | NotionDemand</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/landing.css">
</head>
<body class="landing-body">

  <div class="gate-section" style="min-height: 100vh;">
    <div class="gate-card">
      <div class="gate-lock">🔐</div>
      <h2>Enter your access code</h2>
      <p>You should have received this after your payment.</p>

      <div class="gate-input-group">
        <input type="text" id="passcode" placeholder="Enter passcode" autocomplete="off">
        <button id="submit-code">Get My Prompts →</button>
      </div>

      <p id="error-msg" class="error hidden">Invalid passcode. Please try again.</p>

      <p class="help-text">Need help? <a href="mailto:team@notiondemand.com">team@notiondemand.com</a></p>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
